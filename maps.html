<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mapping Victory</title>
    <link rel="stylesheet" href="https://use.typekit.net/jjk5ixf.css">
    <link rel="stylesheet" href="js/leaflet/leaflet.css">
    <link rel="stylesheet" href="js/markercluster/MarkerCluster.css">
    <link type="text/css" rel="stylesheet" href="css/mapping_victory.css">
</head>
<body class="gallery-page">
    <!-- SVG Graphics -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <symbol id="icon-close" viewBox="0 0 16 16">
            <line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </symbol>
        <symbol id="icon-share" viewBox="0 0 35.74 35.74">
            <circle cx="17.87" cy="17.87" r="17.87" fill="#292419"/>
            <g>
                <path d="M25.6,14.01c-.43,0-.77.35-.77.77v10.05h-13.91v-10.05c0-.43-.35-.77-.77-.77s-.77.35-.77.77v10.82c0,.43.35.77.77.77h15.46c.43,0,.77-.35.77-.77v-10.82c0-.43-.35-.77-.77-.77Z" fill="#eeeee6" stroke="#eeeee6" stroke-miterlimit="10" stroke-width=".5px"/>
                <path d="M15.32,13.78l1.77-1.77v8.18c0,.43.35.77.77.77s.77-.35.77-.77v-8.18l1.77,1.77c.15.15.35.23.55.23s.4-.08.55-.23c.3-.3.3-.79,0-1.09l-3.09-3.09c-.3-.3-.79-.3-1.09,0l-3.09,3.09c-.3.3-.3.79,0,1.09.3.3.79.3,1.09,0h0Z" fill="#eeeee6" stroke="#eeeee6" stroke-miterlimit="10" stroke-width=".5px"/>
            </g>
        </symbol>
        <symbol id="icon-share-white" viewBox="0 0 35.74 35.74">
            <circle cx="17.87" cy="17.87" r="17.87" fill="#eeeee6"/>
            <g>
                <path d="M25.6,14.01c-.43,0-.77.35-.77.77v10.05h-13.91v-10.05c0-.43-.35-.77-.77-.77s-.77.35-.77.77v10.82c0,.43.35.77.77.77h15.46c.43,0,.77-.35.77-.77v-10.82c0-.43-.35-.77-.77-.77Z" fill="#292419" stroke="#292419" stroke-miterlimit="10" stroke-width=".5px"/>
                <path d="M15.32,13.78l1.77-1.77v8.18c0,.43.35.77.77.77s.77-.35.77-.77v-8.18l1.77,1.77c.15.15.35.23.55.23s.4-.08.55-.23c.3-.3.3-.79,0-1.09l-3.09-3.09c-.3-.3-.79-.3-1.09,0l-3.09,3.09c-.3.3-.3.79,0,1.09.3.3.79.3,1.09,0h0Z" fill="#292419" stroke="#292419" stroke-miterlimit="10" stroke-width=".5px"/>
            </g>
        </symbol>
    </svg>

    <header>
        <div class="header-links">
            <a href="about.html">About</a>
            <a href="index.html">Gallery</a>
        </div>
        <div id="logo-container" class="gallery-page">
            <a href="index.html"><img src="images/logo.svg" alt="Mapping Victory: U.S. Army Souvenir Maps from the European Theater of Operations, 1944-46"></a>
        </div>
        <div class="toggle-switch-container">
            <span class="toggle-switch">
                <a href="index.html">Features <span id="total-features-counter" class="count-badge">100</span></a>
                <a href="maps.html" class="active right">Maps <span id="total-maps-counter" class="count-badge">100</span></a>
            </span>
        </div>
    </header>
    <main class="filter-and-gallery-container">
        <div id="filter-div">
            <input type="text" id="gallery-search-box" placeholder="Search">
        </div>
        <div id="gallery-div">
            <div id="filter-indicator-div" class="hidden"></div>
            <div id="galleries"></div>
        </div>
    </main>
    <footer id="footer">
    </footer>

    <script src="js/openseadragon/openseadragon.min.js"></script>
    <script src="js/leaflet/leaflet.js"></script>
    <script src="js/markercluster/leaflet.markercluster.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/tippy-bundle.umd.min.js"></script>
    <script src="js/utilities.js"></script>
    <script src="js/corpus.js"></script>
    <script src="js/faceter.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/detailer.js"></script>
    <script src="js/mapper.js"></script>
    <script language="javascript">
        window.mv = {
            corporaHost: 'https://corpora.library.tamu.edu',
            corpusID: '66d0cf276083e79367c617c6',
            faceter: null,
            detailer: null,
            mapper: null,
            showDefaultGalleries: null,
            galleryIDs: new Set(),
            urlParams: new URLSearchParams(window.location.search)
        }
        window.mv['api'] = `${mv.corporaHost}/api/corpus/${mv.corpusID}`

        // load footer
        getEl('footer').innerHTML = mvTemplates.footer()

        // MAIN ENTRY POINT
        document.addEventListener('DOMContentLoaded', function() {
            mv.corpus = new Corpus()
            mv.corpus.build(() => {
                let filterDiv = getEl('filter-div')
                mv.faceter = new Faceter(filterDiv, 'Map')
                mv.detailer = new Detailer('#gallery-div')
                mv.mapper = new Mapper()

                // set total counts
                getEl('total-features-counter').innerHTML = mv.corpus.meta['Feature'].ids.length.toLocaleString()
                getEl('total-maps-counter').innerHTML = mv.corpus.meta['Map'].ids.length.toLocaleString()

                // build facet lists
                mv.faceter.buildFacetList('Tag', 'Tags')
                mv.faceter.buildFacetList('Event', 'Events')
                mv.faceter.buildFacetList('Unit', 'Units')
                mv.faceter.buildFacetList('Region', 'Places')

                // sort map IDs by num features each have
                mv.corpus.meta.Map.ids = Object.keys(mv.corpus.content.Map).sort((a, b) => {
                    let numFeaturesA = 0
                    let numFeaturesB = 0

                    if (mv.corpus.content.Map[a]._conns?.Feature) numFeaturesA = mv.corpus.content.Map[a]._conns.Feature.size
                    if (mv.corpus.content.Map[b]._conns?.Feature) numFeaturesB = mv.corpus.content.Map[b]._conns.Feature.size

                    return numFeaturesB - numFeaturesA
                })

                // determine default behavior for page load
                mv.showDefaultGalleries = () => {
                    let galleryDiv = getEl('galleries')
                    clearEl(galleryDiv)
                    new Gallery(galleryDiv, 'Map', 'All Maps', false)
                }

                // respond to page load based on any GET params
                // or perform default behavior
                mv.faceter.handlePageLoad()

                // rig up gallery pane click event
                document.addEventListener('click', (e) => {
                    let pane = e.target.closest('.gallery-pane')
                    if (pane) {
                        window.open(`map.html?map-id=${pane.dataset.id}`, '_blank')
                    }
                })
            })
        })

    </script>
</body>
</html>
