<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mapping Victory</title>
    <link rel="stylesheet" href="https://use.typekit.net/jjk5ixf.css">
    <link rel="stylesheet" href="js/leaflet/leaflet.css">
    <link rel="stylesheet" href="js/markercluster/MarkerCluster.css">
    <link type="text/css" rel="stylesheet" href="css/mapping_victory.css">
</head>
<body class="internal">
<!-- SVG Graphics -->
<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <symbol id="icon-close" viewBox="0 0 16 16">
        <line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-share" viewBox="0 0 35.74 35.74">
        <circle cx="17.87" cy="17.87" r="17.87" fill="#292419"/>
        <g>
            <path d="M25.6,14.01c-.43,0-.77.35-.77.77v10.05h-13.91v-10.05c0-.43-.35-.77-.77-.77s-.77.35-.77.77v10.82c0,.43.35.77.77.77h15.46c.43,0,.77-.35.77-.77v-10.82c0-.43-.35-.77-.77-.77Z" fill="#eeeee6" stroke="#eeeee6" stroke-miterlimit="10" stroke-width=".5px"/>
            <path d="M15.32,13.78l1.77-1.77v8.18c0,.43.35.77.77.77s.77-.35.77-.77v-8.18l1.77,1.77c.15.15.35.23.55.23s.4-.08.55-.23c.3-.3.3-.79,0-1.09l-3.09-3.09c-.3-.3-.79-.3-1.09,0l-3.09,3.09c-.3.3-.3.79,0,1.09.3.3.79.3,1.09,0h0Z" fill="#eeeee6" stroke="#eeeee6" stroke-miterlimit="10" stroke-width=".5px"/>
        </g>
    </symbol>
</svg>

<header class="internal">
    <a href="index.html" class="logo"><h1>Mapping Victory</h1></a>
    <div class="header-links">
        <a href="about.html">About</a>
        <a href="index.html">Gallery</a>
    </div>
</header>
<main class="internal">
    <div id="map-header">
        <h2 id="map-title"></h2>
        <a id="map-cite-button" href="#map-citation-div" class="link-button">Cite this</a>
    </div>
    <div class="map-detail-viewer">
        <div id="metadata-div">

        </div>
        <div id="map-div">
            <div id="dragon-div"></div>
        </div>
    </div>
</main>
<footer id="footer" class="internal">
</footer>

<script src="js/openseadragon/openseadragon.min.js"></script>
<script src="js/leaflet/leaflet.js"></script>
<script src="js/markercluster/leaflet.markercluster.js"></script>
<script src="js/utilities.js"></script>
<script src="js/corpus.js"></script>
<script src="js/faceter.js"></script>
<script src="js/detailer.js"></script>
<script src="js/map-feature.js"></script>

<script language="javascript">
    window.mv = {
        corporaHost: 'https://corpora.library.tamu.edu',
        corpusID: '66d0cf276083e79367c617c6',
        corpus: null,
        faceter: null,
        dragon: null,
        detailer: null,
        mapID: null,
        currentImageURI: null,
        dragonOpenCallback: null,
        urlParams: new URLSearchParams(window.location.search),

    }
    window.mv['api'] = `${mv.corporaHost}/api/corpus/${mv.corpusID}`

    // load footer
    getEl('footer').innerHTML = mvTemplates.footer()

    // MAIN ENTRY POINT
    document.addEventListener('DOMContentLoaded', function() {
        mv.mapID = window.mv.urlParams.get('map-id')

        if (mv.mapID) {
            mv.corpus = new Corpus()

            mv.corpus.build(() => {
                let map = mv.corpus.getContent('Map', mv.mapID)
                if (map) {
                    let metaDiv = getEl('metadata-div')
                    mv.currentImageURI = map.iiif_url
                    mv.detailer = new Detailer('#map-div')
                    mv.faceter = new Faceter(null)

                    // title
                    getEl('map-title').innerHTML = map.title

                    // ephemera
                    if (map.ephemera?.length) {
                        let images = []
                        let imageWidth = parseInt(metaDiv.clientWidth - 10)

                        map.ephemera.unshift(map.iiif_url)
                        map.ephemera.forEach(imageURI => {
                            let imageURL = `${imageURI}/full/${imageWidth},/0/default.jpg`

                            images.push(`
                                <img class="ephemera-image${ imageURI === mv.currentImageURI ? ' selected' : '' }" src="${imageURL}" data-uri=${imageURI} />
                            `)
                        })

                        appendToEl(metaDiv, `
                            <div class="feature-detail-metadatum">
                                <div class="feature-detail-metadatum-field white-bg">Images</div>
                                <div class="feature-detail-metadatum-value white-bg">${images.join('\n')}</div>
                            </div>
                        `)

                        forElsMatching('.ephemera-image', (ephemeraImage) => {
                            ephemeraImage.addEventListener('click', (e) => {
                                if (e.target.dataset.uri !== mv.currentImageURI) {
                                    getElWithQuery('.ephemera-image.selected').classList.remove('selected')
                                    showDragonImage(e.target.dataset.uri, () => {
                                        makeFeatures(null)
                                    })
                                    e.target.classList.add('selected')
                                }
                            })
                        })
                    }

                    // description
                    if (map.description) {
                        appendToEl(metaDiv, `
                            <div class="feature-detail-metadatum">
                                <div class="feature-detail-metadatum-field white-bg">Description</div>
                                <div class="feature-detail-metadatum-value white-bg">${map.description}</div>
                            </div>
                        `)
                    }

                    // unit
                    if (map.military_unit) {
                        appendToEl(metaDiv, `
                            <div class="feature-detail-metadatum">
                                <div class="feature-detail-metadatum-field white-bg">Unit</div>
                                <div class="feature-detail-metadatum-value white-bg"><a href="index.html?Unit=${map.military_unit.id}">${map.military_unit.label}</a></div>
                            </div>
                        `)
                    }

                    // date
                    if (map.date?.start) {
                        appendToEl(metaDiv, `
                            <div class="feature-detail-metadatum">
                                <div class="feature-detail-metadatum-field white-bg">Date</div>
                                <div class="feature-detail-metadatum-value white-bg">${parseDate(map.date.start)}</div>
                            </div>
                        `)
                    }

                    // artists
                    if (map.artists && map.artists?.length) {
                        let people = []
                        map.artists.forEach(person => {
                            people.push(`<a href="index.html?Person=${person.id}">${person.label}</a>`)
                        })
                        appendToEl(metaDiv, `
                            <div class="feature-detail-metadatum">
                                <div class="feature-detail-metadatum-field white-bg">Artists</div>
                                <div class="feature-detail-metadatum-value white-bg">${people.join('\n')}</div>
                            </div>
                        `)
                    }

                    // printers
                    if (map.printers && map.printers?.length) {
                        let people = []
                        map.printers.forEach(person => {
                            people.push(`<a href="index.html?Person=${person.id}">${person.label}</a>`)
                        })
                        appendToEl(metaDiv, `
                            <div class="feature-detail-metadatum">
                                <div class="feature-detail-metadatum-field white-bg">Printers</div>
                                <div class="feature-detail-metadatum-value white-bg">${people.join('\n')}</div>
                            </div>
                        `)
                    }

                    // MAP IMAGE
                    mv.dragon = OpenSeadragon({
                        id: 'dragon-div',
                        prefixUrl: 'js/openseadragon/images/',
                    })
                    mv.dragon.addHandler('open', () => {
                        const tiledImage = mv.dragon.world.getItemAt(0)
                        const imageBounds = tiledImage.getBounds()

                        // Get the viewport height in image coordinates
                        const viewportHeight = mv.dragon.viewport.getBoundsNoRotate().height

                        // Center X on the image, set Y so image top aligns with viewport top
                        const centerX = imageBounds.x + imageBounds.width / 2
                        const centerY = imageBounds.y + viewportHeight / 2

                        mv.dragon.viewport.panTo(new OpenSeadragon.Point(centerX, centerY), true)

                        if (mv.dragonOpenCallback !== null) {
                            mv.dragonOpenCallback()
                            mv.dragonOpenCallback = null
                        }
                    })

                    // actually show the map now
                    showDragonImage(map.iiif_url, () => {

                        // FEATURES
                        makeFeatures(metaDiv)

                        // CITATION
                        let mapLink = `https://mappingvictory.org/map.html?map-id=${map.id}`
                        appendToEl(metaDiv, `
                            <div id="map-citation-div" class="feature-detail-metadatum">
                                <div class="feature-detail-metadatum-field white-bg">Citation</div>
                                <div class="feature-detail-metadatum-value white-bg">
                                    "${map.title}," <i>Mapping Victory</i>, Courtesy of Cooper K. Ragan Military Collection,
                                    Cushing Memorial Library and Archives, Texas A&M University,
                                    <a href="${mapLink}">${mapLink}</a>.
                            </div>
                        `)

                        // check to see if the citation was targeted in the initial URL
                        if (window.location.hash === '#map-citation-div') {
                            let citationDiv = getEl('map-citation-div')
                            citationDiv.scrollIntoView()
                            citationDiv.classList.add('emphasize')
                        }

                        // HANDLE A FEATURE ID BEING PASSED IN AS GET PARAM
                        if (mv.urlParams.has('feature-id')) {
                            let featureID = mv.urlParams.get('feature-id')
                            let featureLink = getEl(`feature-link-${featureID}`)
                            let featureMetaDiv = getEl(`feature-metadata-pane-${featureID}`)
                            window.mv.detailer.showFeatureDetails(featureLink, featureMetaDiv)
                        }
                    })
                }
            })
        }
    })

    // this function is used to initially show the map but also to switch between
    // images should the map have ephemera
    function showDragonImage(imageURI, callback) {
        mv.currentImageURI = imageURI
        mv.dragonOpenCallback = callback
        mv.dragon.open(`${imageURI}/info.json`)
    }

    function makeFeatures(metaDiv) {
        let features = mv.corpus.getAssociatedContents('Map', mv.mapID, 'Feature')
        if (features.length) {
            if (metaDiv !== null) {
                appendToEl(metaDiv, `
                    <div class="feature-detail-metadatum values-below">
                        <div class="feature-detail-metadatum-field white-bg">Features</div>
                        <div id="feature-div" class="feature-detail-metadatum-value white-bg"></div>
                    </div>
                `)
            }

            let featureDiv = getEl('feature-div')
            let dragon = window.mv.dragon
            let colorClasses = ['yellow', 'red', 'blue']

            features.forEach((feature, featureCount) => {

                if (feature.image_url) {
                    let colorClass = colorClasses[featureCount % colorClasses.length]
                    let d = extractFeatureDimensions(feature.image_url)

                    // sanity check
                    if (d.width > 0) {
                        // create feature link
                        if (metaDiv !== null) {
                            appendToEl(featureDiv, `
                                <a href="#" id="feature-link-${feature.id}" class="feature-link clickable-feature"
                                    data-id="${feature.id}"
                                    data-uri="${d.uri}"
                                    data-x="${d.x}"
                                    data-y="${d.y}"
                                    data-width="${d.width}"
                                    data-height="${d.height}">
                                        ${feature.label}
                                </a>
                                <div id="feature-metadata-pane-${feature.id}" class="feature-metadata-pane"></div>
                            `)
                        }

                        // create overlay
                        if (d.uri === mv.currentImageURI) {
                            let imageRect = new OpenSeadragon.Rect(
                                d.x,
                                d.y,
                                d.width,
                                d.height
                            )
                            let viewportRect = dragon.viewport.imageToViewportRectangle(imageRect)

                            let overlay = document.createElement('div')
                            overlay.id = `feature-overlay-${feature.id}`
                            overlay.dataset.id = feature.id
                            overlay.dataset.uri = d.uri
                            overlay.dataset.x = d.x
                            overlay.dataset.y = d.y
                            overlay.dataset.width = d.width
                            overlay.dataset.height = d.height
                            overlay.classList.add('feature-overlay')
                            overlay.classList.add(colorClass)
                            overlay.classList.add('disabled')

                            dragon.addOverlay({element: overlay, location: viewportRect})
                        }
                    }
                } else {
                    console.log("This feature doesn't have a valid image url:")
                    console.log(feature)
                }
            })

            // rig up click events for features
            if (metaDiv !== null) {
                forElsMatching('.clickable-feature', (featureEl) => {
                    featureEl.addEventListener('mouseenter', (e) => {
                        if (e.target.dataset.uri === mv.currentImageURI) {
                            let featureID = e.target.dataset.id
                            let overlay = getEl('feature-overlay-' + featureID)
                            if (overlay) {
                                overlay.classList.remove('disabled')
                            }
                        }
                    })

                    featureEl.addEventListener('mouseleave', (e) => {
                        let featureID = e.target.dataset.id
                        let overlay = getEl('feature-overlay-' + featureID)
                        if (overlay) {
                            overlay.classList.add('disabled')
                        }
                    })

                    featureEl.addEventListener('click', (e) => {
                        // switch to new image if necessary
                        if (e.target.dataset.uri !== mv.currentImageURI) {
                            showDragonImage(e.target.dataset.uri, ()  => {
                                makeFeatures(null)
                                window.mv.detailer.showFeatureDetails(e.target, getEl(`feature-metadata-pane-${e.target.dataset.id}`))
                            })
                        } else window.mv.detailer.showFeatureDetails(e.target, getEl(`feature-metadata-pane-${e.target.dataset.id}`))

                        e.preventDefault()
                    })
                })
            }

            forElsMatching('.feature-overlay', (overlay) => {
                let mouseTracker = new OpenSeadragon.MouseTracker({
                    element: overlay,
                    clickHandler: (e) => {
                        let featureLink = getEl(`feature-link-${overlay.dataset.id}`)
                        window.mv.detailer.showFeatureDetails(featureLink, getEl(`feature-metadata-pane-${overlay.dataset.id}`))
                        return true
                    }
                })
            })
        }
    }

</script>
</body>
</html>
